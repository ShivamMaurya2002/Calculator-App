<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Format Calculator</title>
    <style>
        body {
            background-color: rgb(2, 224, 253);
        }
        .calculator {
            background-color: rgba(0, 0, 0, 0.872);
            width: 350px;
            height: 450px;
            margin: 20px auto;
            padding: 15px;
            border: 2px solid #ffffff;
            border-radius: 15px;
            box-shadow: 0px 5px 30px #e4504e;
        }
        .calculator-screen {
            border: 2px solid #ff0400;
            border-radius: 10px;
            width: 100%;
            height: 70px;
            margin-bottom: 10px;
            padding: 11px;
            font-size: 20px;
            color: #1100ff;
            background-color: #faf5f5;
            text-align: right;
            box-sizing: border-box;
        }
        .calculator-keys {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 10px;
        }
        button {
            padding: 10px;
            width: 77px;
            height: 60px;
            font-size: 18px;
            border: 1px solid #ff0000;
            border-radius: 10px;
            background-color: #3507ef;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #f30909;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" class="calculator-screen" id="display" value="" readonly>
        <div class="calculator-keys">
            <button onclick="appendNumber(7)">7</button>
            <button onclick="appendNumber(8)">8</button>
            <button onclick="appendNumber(9)">9</button>
            <button onclick="appendOperator('/')">/</button>
            <button onclick="appendNumber(4)">4</button>
            <button onclick="appendNumber(5)">5</button>
            <button onclick="appendNumber(6)">6</button>
            <button onclick="appendOperator('*')">*</button>
            <button onclick="appendNumber(1)">1</button>
            <button onclick="appendNumber(2)">2</button>
            <button onclick="appendNumber(3)">3</button>
            <button onclick="appendOperator('-')">-</button>
            <button onclick="calculateSquareRoot()">√</button>
            <button onclick="appendNumber(0)">0</button>
            <button onclick="appendDecimal()">.</button>
            <button onclick="appendOperator('+')">+</button>
            <button onclick="calculatePercentage()">%</button>
            <button onclick="clearScreen()">C</button>
            <button onclick="deleteNumber()">⌫</button>
            <button onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let currentInput = '';

        function appendNumber(num) {
            currentInput += num;
            updateDisplay();
        }

        function appendOperator(operator) {
            if (currentInput === '' || /[\+\-\*\/]$/.test(currentInput)) return;
            currentInput += operator;
            updateDisplay();
        }

        function appendDecimal() {
            let parts = currentInput.split(/[\+\-\*\/]/);
            if (!parts[parts.length - 1].includes('.')) {
                currentInput += '.';
                updateDisplay();
            }
        }

        function clearScreen() {
            currentInput = '';
            updateDisplay();
        }

        function deleteNumber() {
            currentInput = currentInput.slice(0, -1);
            updateDisplay();
        }

        function calculate() {
            try {
                let expression = currentInput.replace(/,/g, ''); // Remove commas for calculation
                let result = eval(expression);
                currentInput = formatIndianNumber(result.toString()); // Format result with commas
                updateDisplay();
            } catch (error) {
                currentInput = 'Error';
                updateDisplay();
            }
        }

        function calculateSquareRoot() {
            if (currentInput === '') return;
            let num = parseFloat(currentInput.replace(/,/g, ''));
            if (num < 0) {
                currentInput = 'Error';
            } else {
                currentInput = formatIndianNumber(Math.sqrt(num).toString());
            }
            updateDisplay();
        }

        function calculatePercentage() {
            if (currentInput === '') return;
            let num = parseFloat(currentInput.replace(/,/g, ''));
            currentInput = formatIndianNumber((num / 100).toString());
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('display').value = currentInput;
        }

        function formatIndianNumber(num) {
            if (num === '' || isNaN(num)) return num;
            
            let parts = num.split('.');
            let integerPart = parts[0];
            let decimalPart = parts.length > 1 ? '.' + parts[1] : '';

            // Add commas in Indian format (first 3 digits from right, then 2 digits)
            let formattedInteger = integerPart.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            
            return formattedInteger + decimalPart;
        }
    </script>
</body>
</html>
